name: Build Resume

on:
  push:
    branches: [ "main" ]  # Run on normal pushes to check for errors
    tags: [ "v*" ]        # Run AND Release when you push a tag like v1.0

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          # MAKE SURE THIS MATCHES YOUR FILE NAME (e.g., resume-systems.tex)
          root_file: |
            resume-systems.tex

      - name: Create Release
        uses: softprops/action-gh-release@v1
        # Only run this step if we actually pushed a tag
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            resume-systems.pdf