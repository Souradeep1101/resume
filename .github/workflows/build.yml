name: Build Resume

# Trigger the build when you push a new tag (e.g., v1.0, v2026.1)
on:
  push:
    tags:
      - "v*"

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is required to create Releases
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          # REPLACE 'resume.tex' WITH YOUR ACTUAL FILENAME
          root_file: |
            resume-systems.tex

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # This uploads the compiled PDF to the release
          # ENSURE THIS MATCHES THE OUTPUT FILENAME (usually same as .tex but with .pdf)
          files: |
            resume-systems.pdf